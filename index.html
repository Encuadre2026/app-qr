<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Asistencia QR — Encuadre 2026</title>
  <meta name="description" content="App de registro de asistencia por QR para el staff de Encuadre 2026" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#050508" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>

  <!-- ═══ PIN Screen ═══ -->
  <div id="pin-screen" class="screen active">
    <div class="pin-container">
      <div class="pin-logo">
        <div class="pin-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <h1>Encuadre 2026</h1>
        <p class="pin-subtitle">Control de Asistencia</p>
      </div>
      <div class="pin-input-group">
        <div class="pin-dots" id="pin-dots">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <p id="pin-error" class="pin-error"></p>
      </div>
      <div class="pin-keypad">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <button class="key key-empty"></button>
        <button class="key" data-key="0">0</button>
        <button class="key key-delete" data-key="del">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
            <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ Main App ═══ -->
  <div id="main-app" class="screen">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">Asistencia</span>
      </div>
      <div class="topbar-right">
        <div id="offline-badge" class="offline-badge hidden">
          <span class="offline-dot"></span>
          <span id="offline-count">0</span>
        </div>
        <button id="btn-logout" class="btn-icon" title="Salir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="scanner" id="tab-scanner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="M23 19a2 2 0 01-2 2h-3m0-20h3a2 2 0 012 2v3M1 5a2 2 0 012-2h3M6 21H3a2 2 0 01-2-2v-3"/>
          <rect x="5" y="5" width="14" height="14" rx="1"/>
        </svg>
        Escáner
      </button>
      <button class="tab" data-tab="search" id="tab-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Buscar
      </button>
    </nav>

    <!-- Scanner Panel -->
    <div id="panel-scanner" class="panel active">
      <div id="qr-reader-container">
        <div id="qr-reader"></div>
        <!-- Botón de activación (para móviles que requieren gesto) -->
        <div id="camera-prompt" class="camera-prompt">
          <button id="btn-start-camera" class="btn-camera">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            Activar cámara
          </button>
          <p class="camera-prompt-hint">Toca para iniciar el escáner QR</p>
        </div>
      </div>
      <p class="scanner-hint" id="scanner-hint">Apunta al código QR del participante</p>
    </div>

    <!-- Search Panel -->
    <div id="panel-search" class="panel">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Nombre o ID..." autocomplete="off" />
      </div>
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- Participant Detail Overlay -->
    <div id="detail-overlay" class="detail-overlay hidden">
      <div class="detail-card">
        <button class="detail-close" id="detail-close">&times;</button>
        <div class="detail-avatar" id="detail-avatar"></div>
        <h2 class="detail-name" id="detail-name"></h2>
        <span class="detail-id" id="detail-id"></span>

        <div class="detail-fields">
          <div class="detail-field">
            <span class="detail-label">Evento</span>
            <span class="detail-value" id="detail-evento"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Correo</span>
            <span class="detail-value" id="detail-correo"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">CURP</span>
            <span class="detail-value" id="detail-curp"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Institución</span>
            <span class="detail-value" id="detail-institucion"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Teléfono</span>
            <span class="detail-value" id="detail-telefono"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Perfil</span>
            <span class="detail-value" id="detail-perfil"></span>
          </div>
          <div class="detail-field" id="detail-asistencia-row">
            <span class="detail-label">Asistencia</span>
            <span class="detail-value" id="detail-asistencia"></span>
          </div>
        </div>

        <button class="detail-btn-marcar" id="detail-btn-marcar">
          ✓ Marcar asistencia
        </button>
      </div>
    </div>

    <!-- Result Overlay (tap to dismiss) -->
    <div id="result-overlay" class="result-overlay hidden" role="button" tabindex="0">
      <div class="result-card" id="result-card">
        <div class="result-icon" id="result-icon"></div>
        <h2 id="result-name"></h2>
        <p class="result-event" id="result-event"></p>
        <p class="result-status" id="result-status"></p>
        <p class="result-time" id="result-time"></p>
        <p class="result-tap">Toca para continuar</p>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <!-- App Logic -->
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
